syntax = "proto3";

package flaggi;

option java_package = "flaggi.proto";
option java_outer_classname = "ClientMessages";

// Wrapper ----------------------------------------------------------------------

message ClientMessage {
    string uuid = 1;
    oneof message_type {
        Ping ping = 2;
        ClientHello clientHello = 3;
        ClientCommand clientCommand = 4;
        ClientInvite clientInvite = 5;
        ClientInviteResponse clientInviteResponse = 6;
    }
}

// Enums ------------------------------------------------------------------------

enum ClientCommandType {
    GET_IDLE_CLIENT_LIST = 0;
}

enum ClientInputType {
    MOUSE_PRESSED = 0;
    MOUSE_RELEASED = 1;
    MOUSE_MOVED = 2;
    KEY_PRESSED = 3;
    KEY_RELEASED = 4;
}

// TCP Messages -----------------------------------------------------------------

message Ping {
    string ping = 1;
}

message ClientHello {
    string username = 1;
}

message ClientCommand {
    ClientCommandType requestType = 2;
}

message ClientInvite {
    string invitee = 1;
}

message ClientInviteResponse {
    string invitee = 1;
    bool accepted = 2;
}

// UDP Messages -----------------------------------------------------------------

message ClientStateUpdate {
    string playerUuid = 1;
    string gameUuid = 2;
    ClientInputType inputType = 3;
    double vh_x = 4;
    double vh_y = 5;
    int32 key_code = 6;
}
