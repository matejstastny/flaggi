syntax = "proto3";

package flaggi;

option java_package = "flaggi.proto";
option java_outer_classname = "ClientMessages";

// Wrapper -------------------------------------------------------------------

message ClientMessage {
    string uuid = 1;
    oneof message_type {
        Ping ping = 2;
        ClientHello clientHello = 3;
        ClientCommand clientCommand = 4;
        ClientInvite clientInvite = 5;
        ClientInviteResponse clientInviteResponse = 6;
    }
}

// Enums ---------------------------------------------------------------------

enum ClientCommandType {
    GET_IDLE_CLIENT_LIST = 0;
}

// TCP Messages --------------------------------------------------------------

message Ping {
    string ping = 1;
}

message ClientHello {
    string username = 1;
}

message ClientCommand {
    ClientCommandType requestType = 2;
}

message ClientInvite {
    string invitee = 1;
}

message ClientInviteResponse {
    string invitee = 1;
    bool accepted = 2;
}

// UDP Messages --------------------------------------------------------------

message ClientStateUpdate {
    string uuid = 1;
    string gameUuid = 2;
    oneof update_type {
        NewPlayerState newPlayerState = 3;
        NewObject newObject = 4;
    }
}

message NewPlayerState {
    int64 x = 2;
    int64 y = 3;
    string animationName = 4;
    int64 animationFrame = 5;
}

message NewObject {
    string objectType = 1;
    int64 x = 2;
    int64 y = 3;
}
