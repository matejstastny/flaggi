name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [8]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'gradle'

      - name: Grant execute permission for Gradlew (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x root/app/gradlew

      - name: Verify Gradle Wrapper
        run: ./app/gradlew --version

      - name: Build Client
        run: ./app/gradlew :client:build --stacktrace --info --no-daemon

      - name: Test Client
        run: ./app/gradlew :client:test --stacktrace --info --no-daemon

      - name: Build Server
        run: ./app/gradlew :server:build --stacktrace --info --no-daemon

      - name: Test Server
        run: ./app/gradlew :server:test --stacktrace --info --no-daemon

      - name: Build Editor
        run: ./app/gradlew :editor:build --stacktrace --info --no-daemon

      - name: Test Editor
        run: ./app/gradlew :editor:test --stacktrace --info --no-daemon
