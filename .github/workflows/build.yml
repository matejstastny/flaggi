name: Build

on:
    push:
        branches: [main]
        paths:
            - "buildSrc/**"
            - "client/**"
            - "server/**"
            - "shared/**"
            - "gradle/**"
            - "settings.gradle.kts"
            - "gradle.properties"

    pull_request:
        branches: [main]
        paths:
            - "buildSrc/**"
            - "client/**"
            - "server/**"
            - "shared/**"
            - "gradle/**"
            - "settings.gradle.kts"
            - "gradle.properties"

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                module: [server, client, shared]

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Build module
              run: ./gradlew :${{ matrix.module }}:build --no-daemon

    spotless:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Check formatting
              run: ./gradlew spotlessCheck --no-daemon
