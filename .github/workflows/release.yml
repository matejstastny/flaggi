name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag (e.g. v1.2.3)"
                required: true
                type: string

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    package:
        name: Package (${{ matrix.target.name }})
        runs-on: ${{ matrix.target.os }}
        strategy:
            fail-fast: false
            matrix:
                target:
                    - name: windows
                      os: windows-latest
                    - name: macos
                      os: macos-latest
                    - name: linux
                      os: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Install WiX 3 (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  choco install wixtoolset -y
                  $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset v3*" |
                    Sort-Object Name -Descending |
                    ForEach-Object { Join-Path $_.FullName "bin" } |
                    Where-Object { (Test-Path (Join-Path $_ "candle.exe")) -and (Test-Path (Join-Path $_ "light.exe")) } |
                    Select-Object -First 1
                  if (-not $wixBin -or -not (Test-Path $wixBin)) {
                    throw "WiX 3 not found under C:\Program Files (x86)"
                  }
                  "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

            - name: Install create-dmg (macOS)
              if: runner.os == 'macOS'
              shell: bash
              run: brew install create-dmg

            - name: Resolve version
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
                    VERSION="${GITHUB_REF_NAME#v}"
                  elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
                    TAG="${{ github.event.inputs.release_tag }}"
                    [[ "$TAG" =~ ^v.+ ]] || { echo "Tag must start with 'v' (got: $TAG)" >&2; exit 1; }
                    VERSION="${TAG#v}"
                  else
                    VERSION="$(grep '^version=' gradle.properties | cut -d= -f2)"
                  fi
                  echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Build client shadowJar
              shell: bash
              run: ./gradlew :client:shadowJar --no-daemon

            - name: Build server shadowJar (Linux)
              if: matrix.target.name == 'linux'
              shell: bash
              run: ./gradlew :server:shadowJar --no-daemon

            - name: Package app
              id: package_app
              shell: bash
              run: ./scripts/package.sh --version "$APP_VERSION" --skip-build

            - name: Prepare release JARs (Linux)
              if: matrix.target.name == 'linux'
              shell: bash
              run: |
                  cp client/build/libs/flaggi-client.jar "dist/Flaggi-${APP_VERSION}-client-universal.jar"
                  cp server/build/libs/flaggi-server.jar "dist/Flaggi-${APP_VERSION}-server.jar"

            - name: Upload packaged artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.target.name }}
                  path: ${{ steps.package_app.outputs.output_file }}
                  if-no-files-found: error

            - name: Upload universal and server JARs (Linux)
              if: matrix.target.name == 'linux'
              uses: actions/upload-artifact@v4
              with:
                  name: release-jars
                  path: |
                      dist/Flaggi-*-client-universal.jar
                      dist/Flaggi-*-server.jar
                  if-no-files-found: error

    publish:
        name: Publish GitHub Release
        needs: package
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest

        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.release_tag }}
                  name: Flaggi ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.release_tag }}
                  files: release-artifacts/**/**
                  generate_release_notes: true
