name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag to publish (for example: v1.2.3)"
                required: true
                type: string

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    package:
        name: Package (${{ matrix.target.name }})
        runs-on: ${{ matrix.target.os }}
        strategy:
            fail-fast: false
            matrix:
                target:
                    - name: windows
                      os: windows-latest
                      package_type: exe
                      icon: assets/icons/win.ico
                      output_ext: exe
                    - name: macos
                      os: macos-latest
                      package_type: app-image
                      icon: assets/icons/flaggi.icns
                      output_ext: dmg
                    - name: linux
                      os: ubuntu-latest
                      package_type: app-image
                      icon: assets/icons/console_icon.png
                      output_ext: tar.gz

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Install WiX 3 (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  choco install wixtoolset -y
                  $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset v3*" |
                    Sort-Object Name -Descending |
                    ForEach-Object { Join-Path $_.FullName "bin" } |
                    Where-Object { (Test-Path (Join-Path $_ "candle.exe")) -and (Test-Path (Join-Path $_ "light.exe")) } |
                    Select-Object -First 1
                  if (-not $wixBin -or -not (Test-Path $wixBin)) {
                    throw "WiX 3 installation not found under C:\Program Files (x86)"
                  }
                  "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

            - name: Install create-dmg (macOS)
              if: runner.os == 'macOS'
              shell: bash
              run: brew install create-dmg

            - name: Resolve version
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                    VERSION="${GITHUB_REF_NAME#v}"
                  elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
                    TAG="${{ github.event.inputs.release_tag }}"
                    if [[ ! "$TAG" =~ ^v.+ ]]; then
                      echo "Manual dispatch requires a tag starting with 'v' (got: $TAG)" >&2
                      exit 1
                    fi
                    VERSION="${TAG#v}"
                  else
                    VERSION="$(grep '^version=' gradle.properties | cut -d= -f2)"
                  fi
                  echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Build shadowJar (Unix)
              if: runner.os != 'Windows'
              shell: bash
              run: ./gradlew :client:shadowJar --no-daemon

            - name: Build server shadowJar (Linux)
              if: matrix.target.name == 'linux'
              shell: bash
              run: ./gradlew :server:shadowJar --no-daemon

            - name: Build shadowJar (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: .\gradlew.bat :client:shadowJar --no-daemon

            - name: Package app
              id: package_app
              shell: bash
              run: |
                  set -euo pipefail

                  APP_NAME="Flaggi"
                  JAR_FILE="client/build/libs/flaggi-client.jar"
                  DIST_DIR="dist"
                  RUNTIME_DIR="build/jre"
                  DMG_BACKGROUND="assets/banners/dmg-background.png"
                  JPACKAGE_DEST="$DIST_DIR"
                  PACKAGE_TYPE="${{ matrix.target.package_type }}"

                  test -f "$JAR_FILE"

                  rm -rf "$RUNTIME_DIR" "$DIST_DIR"
                  mkdir -p "$DIST_DIR"

                  if [[ "${{ matrix.target.name }}" == "macos" ]]; then
                    JPACKAGE_DEST="build/app-image"
                    rm -rf "$JPACKAGE_DEST"
                    mkdir -p "$JPACKAGE_DEST"
                    test -f "$DMG_BACKGROUND"
                  fi

                  MODULES=$(jdeps --multi-release 21 --print-module-deps --ignore-missing-deps "$JAR_FILE")

                  jlink \
                    --add-modules "$MODULES" \
                    --output "$RUNTIME_DIR" \
                    --strip-debug \
                    --no-header-files \
                    --no-man-pages

                  JPACKAGE_ARGS=(
                    --input client/build/libs
                    --main-jar "flaggi-client.jar"
                    --name "$APP_NAME"
                    --app-version "$APP_VERSION"
                    --type "$PACKAGE_TYPE"
                    --dest "$JPACKAGE_DEST"
                    --runtime-image "$RUNTIME_DIR"
                    --icon "${{ matrix.target.icon }}"
                  )

                  if [[ "${{ runner.os }}" == "Windows" ]]; then
                    JPACKAGE_ARGS+=(--win-per-user-install --win-menu --win-shortcut)
                  fi

                  jpackage "${JPACKAGE_ARGS[@]}"

                  case "${{ matrix.target.name }}" in
                    windows)
                      src_file=$(find "$DIST_DIR" -maxdepth 1 -name '*.exe' -print -quit)
                      out_file="$DIST_DIR/Flaggi-${APP_VERSION}-windows.exe"
                      mv "$src_file" "$out_file"
                      ;;
                    macos)
                      out_file="$DIST_DIR/Flaggi-${APP_VERSION}-macos.dmg"
                      rm -f "$out_file"
                      create-dmg \
                        --volname "$APP_NAME" \
                        --volicon "${{ matrix.target.icon }}" \
                        --background "$DMG_BACKGROUND" \
                        --window-pos 200 120 \
                        --window-size 660 400 \
                        --icon-size 100 \
                        --icon "${APP_NAME}.app" 165 190 \
                        --hide-extension "${APP_NAME}.app" \
                        --app-drop-link 495 190 \
                        "$out_file" \
                        "$JPACKAGE_DEST"
                      ;;
                    linux)
                      tar -C "$DIST_DIR" -czf "$DIST_DIR/Flaggi-${APP_VERSION}-linux.tar.gz" "$APP_NAME"
                      cp "client/build/libs/flaggi-client.jar" "$DIST_DIR/Flaggi-${APP_VERSION}-client-universal.jar"
                      cp "server/build/libs/flaggi-server.jar" "$DIST_DIR/Flaggi-${APP_VERSION}-server.jar"
                      out_file="$DIST_DIR/Flaggi-${APP_VERSION}-linux.tar.gz"
                      ;;
                  esac

                  echo "output_file=$out_file" >> "$GITHUB_OUTPUT"

            - name: Upload packaged artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.target.name }}
                  path: ${{ steps.package_app.outputs.output_file }}
                  if-no-files-found: error

            - name: Upload universal and server jars
              if: matrix.target.name == 'linux'
              uses: actions/upload-artifact@v4
              with:
                  name: release-jars
                  path: |
                      dist/Flaggi-*-client-universal.jar
                      dist/Flaggi-*-server.jar
                  if-no-files-found: error

    publish:
        name: Publish GitHub Release
        needs: package
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest

        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.release_tag }}
                name: Flaggi ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.release_tag }}
                files: release-artifacts/**/**
                generate_release_notes: true
