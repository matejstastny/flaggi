name: Format

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: format-${{ github.ref }}
    cancel-in-progress: true

jobs:
    prettier:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - name: Check formatting
              run: npx prettier --check .
